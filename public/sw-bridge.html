<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="robots" content="noindex" />
  <title>MOKKEDA Push Bridge</title>
</head>
<body>
<script>
(function () {
  "use strict";

  var VAPID_PUBLIC_KEY = "BHHAw9e5rSVttkuLfz1TRvebwIRP4UT_SNWneI22hxdvbn_q4eOFrqojYby2mRsgtYR_5yp2mljlCc2-u9pCcSU";
  var API_BASE = "https://asia-northeast1-cx-platform-v1.cloudfunctions.net/api";
  var SW_URL = "/push-sw.js";

  function getParam(name) {
    try {
      return new URLSearchParams(window.location.search).get(name) || "";
    } catch (e) { return ""; }
  }

  function postToParent(msg) {
    try { window.parent.postMessage(msg, "*"); } catch (e) {}
  }

  function urlBase64ToUint8Array(base64String) {
    var padding = "=".repeat((4 - (base64String.length % 4)) % 4);
    var base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
    var rawData = atob(base64);
    var arr = new Uint8Array(rawData.length);
    for (var i = 0; i < rawData.length; i++) {
      arr[i] = rawData.charCodeAt(i);
    }
    return arr;
  }

  var siteId  = getParam("siteId");
  var siteKey = getParam("siteKey");
  var mode    = getParam("mode"); // "subscribe" | "check"

  // 必要な API が無い環境では即終了
  if (!siteId || !("serviceWorker" in navigator) || !("PushManager" in window)) {
    postToParent({ type: "cx_push_unsupported" });
    return;
  }

  navigator.serviceWorker.register(SW_URL).then(function (reg) {
    // check モード: 現在の購読状態だけ返す
    if (mode === "check") {
      return reg.pushManager.getSubscription().then(function (sub) {
        postToParent({ type: "cx_push_status", subscribed: !!sub });
      });
    }

    // subscribe モード: 許可を求めて購読
    return Notification.requestPermission().then(function (permission) {
      if (permission === "denied") {
        postToParent({ type: "cx_push_denied" });
        return;
      }
      if (permission !== "granted") {
        postToParent({ type: "cx_push_dismissed" });
        return;
      }

      return reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      }).then(function (sub) {
        var subJson = JSON.stringify(sub.toJSON());
        var ua = "";
        try { ua = navigator.userAgent || ""; } catch (e) {}

        return fetch(API_BASE + "/v1/push/subscribe", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            site_id: siteId,
            site_key: siteKey,
            subscription: subJson,
            ua: ua,
          }),
        }).then(function (res) {
          if (!res.ok) throw new Error("subscribe_api_failed: " + res.status);
          postToParent({ type: "cx_push_subscribed" });
        });
      });
    });
  }).catch(function (e) {
    postToParent({ type: "cx_push_error", error: String(e) });
  });
})();
</script>
</body>
</html>
